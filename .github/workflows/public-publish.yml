name: Release to public npm

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  approve-release:
    if: "${{ github.event.pull_request.merged == true && startsWith(github.event.pull_request.title, 'Release: ') }}"
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
    steps:
      # persist-credentials: true (default) so Git keeps auth for tag push; no token-in-URL needed.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: lts/*
          registry-url: "https://registry.npmjs.org"
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          VERSION=$(node -p "require('./package.json').version")
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          if ! git ls-remote --tags origin | grep -q "refs/tags/v$VERSION$"; then
            git tag "v$VERSION"
            git push origin "v$VERSION"
          fi
          npm publish --access public --provenance --tag latest --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Uses GitHub’s default release notes (merged PRs + contributors since previous tag).
      - name: Create GitHub Release with generated changelog
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; skipping."
          else
            gh release create "$TAG" --title "$TAG" --generate-notes
          fi
