name: CI Checks

on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main, develop, staging]
    types: [opened, reopened, synchronize]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "lts/*"

jobs:
  security_checks:
    name: 🔐 Security Checks
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [setup]
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: moderate
          vulnerability-check: true
          license-check: true

      - name: Restore dependencies
        uses: ./.github/actions/node-restore-cache
        with:
          cache-key: ${{ needs.setup.outputs.cache-key }}
          node-version: ${{ env.NODE_VERSION }}

      - name: Security audit
        run: |
          set +e
          npm audit signatures 2>&1
          SIGNATURES_EXIT=$?
          npm audit --audit-level=moderate 2>&1
          MODERATE_EXIT=$?
          npm exec --yes -- audit-ci@7 --config "${GITHUB_WORKSPACE}/.github/scripts/audit-ci.jsonc" 2>&1
          HIGH_EXIT=$?
          set -e

          [ $SIGNATURES_EXIT -eq 0 ] && SIGNATURES_STATUS="PASS" || SIGNATURES_STATUS="WARN"
          [ $MODERATE_EXIT -eq 0 ] && MODERATE_STATUS="PASS" || MODERATE_STATUS="WARN"
          [ $HIGH_EXIT -eq 0 ] && HIGH_STATUS="PASS" || HIGH_STATUS="WARN"

          AUD_JSON="${RUNNER_TEMP:-/tmp}/npm-audit.json"
          npm audit --json > "${AUD_JSON}" 2>/dev/null || true

          {
            echo "## Security Audit Summary"
            echo ""
            echo "| Scope | Signatures Audit | Moderate Audit | High/Critical (audit-ci) | Gate |"
            echo "|---|---|---|---|---|"
            echo "| Repo | ${SIGNATURES_STATUS} | ${MODERATE_STATUS} | ${HIGH_STATUS} | High/Critical (audit-ci + allowlist) |"
            echo ""
            echo "High/Critical gate uses \`audit-ci\` with \`.github/scripts/audit-ci.jsonc\`."
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          bash "${GITHUB_WORKSPACE}/.github/scripts/github-summary-npm-audit-high-critical.sh" "${AUD_JSON}" >> "$GITHUB_STEP_SUMMARY" || true
          {
            echo ""
            echo "**Note:** Package rows are from **\`npm audit --json\`**. Job success still depends on **audit-ci**; allowlisted GHSA IDs may remain listed."
          } >> "$GITHUB_STEP_SUMMARY"

          if [ $SIGNATURES_EXIT -ne 0 ]; then
            echo "::warning::npm audit signatures reported issues"
          fi
          if [ $MODERATE_EXIT -ne 0 ]; then
            echo "::warning::npm audit reported moderate-level issues"
          fi
          if [ $HIGH_EXIT -ne 0 ]; then
            echo "::error::audit-ci reported high/critical issues (see .github/scripts/audit-ci.jsonc allowlist)"
          fi

          [ $HIGH_EXIT -eq 0 ]

  setup:
    name: 📦 Setup Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    outputs:
      cache-key: ${{ steps.setup-deps.outputs.cache-key }}
      lockfile-outcome: ${{ steps.lockfile.outcome }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Lockfile consistency check
        id: lockfile
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f package-lock.json ]; then
            echo "No package-lock.json; skipping lockfile check"
            exit 0
          fi
          npm install --package-lock-only --ignore-scripts --no-audit --no-fund
          git diff --exit-code package-lock.json || (
            echo "::error::package-lock.json is out of sync with package.json."
            echo "::error::Regenerate with: npm install --package-lock-only --ignore-scripts --no-audit --no-fund"
            exit 1
          )

      - name: Install dependencies and cache node_modules
        id: setup-deps
        uses: ./.github/actions/node-setup-cache
        with:
          node-version: ${{ env.NODE_VERSION }}

  lint:
    name: ✨ Lint Code
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [setup]
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Restore dependencies
        uses: ./.github/actions/node-restore-cache
        with:
          cache-key: ${{ needs.setup.outputs.cache-key }}
          node-version: ${{ env.NODE_VERSION }}

      - name: Run linting
        run: npm run lint --if-present

  typecheck:
    name: 🔎 Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [setup]
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Restore dependencies
        uses: ./.github/actions/node-restore-cache
        with:
          cache-key: ${{ needs.setup.outputs.cache-key }}
          node-version: ${{ env.NODE_VERSION }}

      - name: Typecheck
        run: npm run typecheck --if-present

  test:
    name: 🧪 Test & Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [setup]
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Restore dependencies
        uses: ./.github/actions/node-restore-cache
        with:
          cache-key: ${{ needs.setup.outputs.cache-key }}
          node-version: ${{ env.NODE_VERSION }}

      - name: Test with coverage
        run: npm run test:coverage --if-present || npm test --if-present

      - name: Enforce coverage threshold (>=80%)
        shell: bash
        run: |
          set -euo pipefail
          MIN=80

          if [ -f coverage/coverage-final.json ]; then
            rm -rf .nyc_output
            mkdir -p .nyc_output
            cp coverage/coverage-final.json .nyc_output/out.json
            set +e
            echo "Running nyc check-coverage (threshold ${MIN}%)..."
            npx --yes nyc check-coverage --lines=$MIN --statements=$MIN --functions=$MIN --branches=$MIN
            EXIT=$?
            set -e
            echo "Running nyc report (text-summary)..."
            NYC_REPORT="$(npx --yes nyc report --reporter=text-summary 2>&1)"
            echo "$NYC_REPORT"
            STMT=$(echo "$NYC_REPORT" | sed -n 's/^Statements[^:]*: *\([0-9.]*\)%.*/\1/p')
            BRANCH=$(echo "$NYC_REPORT" | sed -n 's/^Branches[^:]*: *\([0-9.]*\)%.*/\1/p')
            FN=$(echo "$NYC_REPORT" | sed -n 's/^Functions[^:]*: *\([0-9.]*\)%.*/\1/p')
            LINES=$(echo "$NYC_REPORT" | sed -n 's/^Lines[^:]*: *\([0-9.]*\)%.*/\1/p')
            [ -z "$STMT" ] && STMT="—"; [ -z "$BRANCH" ] && BRANCH="—"; [ -z "$FN" ] && FN="—"; [ -z "$LINES" ] && LINES="—"
            [ $EXIT -eq 0 ] && ICON="✅ PASS" || ICON="❌ FAIL"
            SRC="coverage-final.json"

            {
              echo "## Coverage Summary"
              echo ""
              echo "| Scope | Status | Threshold | Statements | Branches | Functions | Lines | Source | Gate |"
              echo "|---|---|---:|---:|---:|---:|---:|---|---|"
              echo "| Repo | ${ICON} | ${MIN}% | ${STMT}% | ${BRANCH}% | ${FN}% | ${LINES}% | ${SRC} | NYC check-coverage |"
            } >> "$GITHUB_STEP_SUMMARY"

            exit $EXIT
          else
            echo "::error::No coverage report found (expected coverage-final.json)."
            exit 1
          fi

  build:
    name: 🏗️ Build & Bundle
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [setup]
    permissions:
      contents: read
    outputs:
      build-ran: ${{ steps.build-gate.outputs.build-ran }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Detect build script
        id: build-gate
        shell: bash
        run: |
          if node -e "const s=require('./package.json').scripts||{}; process.exit(s.build?0:1)"; then
            echo "build-ran=true" >> "$GITHUB_OUTPUT"
          else
            echo "build-ran=false" >> "$GITHUB_OUTPUT"
            echo "No \`build\` script in package.json; skipping build and bundle report."
          fi

      - name: Restore dependencies
        if: steps.build-gate.outputs.build-ran == 'true'
        uses: ./.github/actions/node-restore-cache
        with:
          cache-key: ${{ needs.setup.outputs.cache-key }}
          node-version: ${{ env.NODE_VERSION }}

      - name: Build and bundle size report
        if: steps.build-gate.outputs.build-ran == 'true'
        shell: bash
        run: |
          set -euo pipefail
          npm run build
          if node -e "const s=require('./package.json').scripts||{}; process.exit(s.size?0:1)"; then
            {
              echo "## Bundle Size Report"
              echo ""
            } >> "$GITHUB_STEP_SUMMARY"
            set +e
            npm run size -- --markdown 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          fi

  summary:
    name: 📋 CI Summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [security_checks, setup, lint, typecheck, test, build]
    if: always() && !cancelled()
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Write job summary
        env:
          R_SECURITY: ${{ needs.security_checks.result }}
          R_SETUP: ${{ needs.setup.result }}
          R_LINT: ${{ needs.lint.result }}
          R_TYPECHECK: ${{ needs.typecheck.result }}
          R_TEST: ${{ needs.test.result }}
          R_BUILD: ${{ needs.build.result }}
          BUILD_RAN: ${{ needs.build.outputs.build-ran }}
          LOCKFILE_OUTCOME: ${{ needs.setup.outputs.lockfile-outcome }}
          REF_NAME: ${{ github.head_ref || github.ref_name }}
          EVENT: ${{ github.event_name }}
        run: |
          ic() {
            case "$1" in
              success) echo "✅" ;;
              failure) echo "❌" ;;
              cancelled) echo "🚫" ;;
              skipped) echo "⏭️" ;;
              *) echo "❔" ;;
            esac
          }
          if [ "${LOCKFILE_OUTCOME}" = "failure" ]; then
            {
              echo "## ❌ Lockfile consistency check failed"
              echo ""
              echo "\`package-lock.json\` is out of sync with \`package.json\`. **Install and caching were not run.**"
              echo ""
              echo "**Fix:**"
              echo '```bash'
              echo "npm install --package-lock-only --ignore-scripts --no-audit --no-fund"
              echo '```'
              echo ""
              echo "See the **Setup Dependencies** job → **Lockfile consistency check** step for details."
              echo ""
            } | tee -a "$GITHUB_STEP_SUMMARY"
          fi
          {
            echo "## 📊 CI Checks summary"
            echo ""
            echo "### 🏷️ Run"
            echo "- **Event:** ${EVENT}"
            echo "- **Branch:** \`${REF_NAME}\`"
            echo ""
            echo "### 📌 Commit"
            echo "- **SHA:** \`$(git rev-parse HEAD)\`"
            echo "- **Message:** $(git log -1 --pretty=format:'%s')"
            echo "- **Author:** $(git log -1 --pretty=format:'%an <%ae>')"
            echo "- **Date:** $(git log -1 --pretty=format:'%ad' --date=short)"
            echo ""
            if [ "${BUILD_RAN}" = "true" ]; then
              R_BUILD_DISPLAY="${R_BUILD}"
            else
              R_BUILD_DISPLAY="skipped"
            fi
            echo "### 🎯 Job results"
            echo "| Job | Result |"
            echo "|-----|--------|"
            echo "| 📦 Setup | $(ic "${R_SETUP}") \`${R_SETUP}\` |"
            echo "| 🔐 Security checks | $(ic "${R_SECURITY}") \`${R_SECURITY}\` |"
            echo "| ✨ Lint | $(ic "${R_LINT}") \`${R_LINT}\` |"
            echo "| 🔎 Typecheck | $(ic "${R_TYPECHECK}") \`${R_TYPECHECK}\` |"
            echo "| 🧪 Test & coverage | $(ic "${R_TEST}") \`${R_TEST}\` |"
            echo "| 🏗️ Build & bundle | $(ic "${R_BUILD_DISPLAY}") \`${R_BUILD_DISPLAY}\` |"
            echo ""
            echo "### ✅ What ran"
            echo "- **One \`npm ci\` per workflow** in setup; downstream jobs restore \`node_modules\` from cache"
            echo "- **PR:** dependency review + \`npm audit\` / \`audit-ci\` (reuse cached deps)"
            echo "- **All events:** parallel lint, typecheck, test$([ "${BUILD_RAN}" = "true" ] && echo ", build" || echo "")"
            echo "- NYC coverage gate (≥80%) when \`coverage-final.json\` is produced"
          } | tee -a "$GITHUB_STEP_SUMMARY"
